<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Fullstack Engineer Study Guide</title><style>:root{color-scheme:dark;--b:#070b14;--p:#0f1626;--p2:#141d30;--t:#edf2ff;--m:#9aa7bd;--a:#6ee7b7;--a2:#60a5fa;--bd:#26334b}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% 10%,#60a5fa20,transparent 30%),radial-gradient(circle at 85% 0%,#6ee7b71a,transparent 30%),var(--b);color:var(--t);font-family:Inter,system-ui,sans-serif}.app{width:min(1180px,calc(100% - 28px));margin:auto;padding:32px 0 60px}.hero{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:end}.tag{color:var(--a);font-size:.75rem;font-weight:800;letter-spacing:.13em;text-transform:uppercase}h1{font-size:clamp(2rem,5vw,4rem);line-height:1;margin:10px 0}.hero p,.muted{color:var(--m)}.progress{border:1px solid var(--bd);background:#0f1626cc;border-radius:16px;padding:15px;min-width:170px}.bar{height:7px;background:#1b263c;border-radius:99px;overflow:hidden;margin-top:10px}.fill{height:100%;background:linear-gradient(90deg,var(--a),var(--a2));transition:.2s}.steps{display:grid;grid-template-columns:repeat(8,minmax(110px,1fr));gap:9px;margin:26px 0;overflow:auto}.step{border:1px solid var(--bd);background:#0f1626cc;color:var(--m);min-height:82px;border-radius:15px;cursor:pointer;font-weight:750;padding:10px}.step.active{color:var(--t);border-color:var(--a);background:linear-gradient(#6ee7b71a,#60a5fa12)}.card{border:1px solid var(--bd);background:#0a0f1ad9;border-radius:22px;padding:clamp(20px,4vw,40px)}.panel{display:none}.panel.active{display:block}.head{border-bottom:1px solid var(--bd);padding-bottom:18px;margin-bottom:18px}.head h2{font-size:2rem;margin:5px 0}.qa{border:1px solid var(--bd);background:var(--p);border-radius:15px;overflow:hidden;margin:11px 0}.q{width:100%;border:0;background:transparent;color:var(--t);display:grid;grid-template-columns:42px 1fr 24px;gap:10px;align-items:center;text-align:left;padding:17px;cursor:pointer;font-weight:750}.n{width:37px;height:37px;display:grid;place-items:center;border-radius:9px;background:#60a5fa1c;color:var(--a2);font-size:.8rem}.arrow{color:var(--a);font-size:1.4rem}.ans{display:none;color:#cbd5e1;line-height:1.65;padding:0 18px 18px 69px;border-top:1px solid var(--bd)}.qa.open .ans{display:block}.qa.open .arrow{transform:rotate(180deg)}.nav{display:flex;justify-content:space-between;margin-top:18px}.nav button{border:1px solid var(--bd);background:var(--p2);color:var(--t);padding:12px 18px;border-radius:11px;font-weight:800;cursor:pointer}.nav .next{background:linear-gradient(90deg,var(--a),var(--a2));color:#07111f;border:0}.nav button:disabled{opacity:.35}.tip{text-align:center;color:var(--m)}@media(max-width:760px){.hero{grid-template-columns:1fr}.steps{grid-template-columns:repeat(8,120px)}.ans{padding-left:18px}}</style></head><body><main class="app"><header class="hero"><div><div class="tag">Preparación entrevista técnica</div><h1>Fullstack Engineer · Study Guide</h1><p>Responde primero en voz alta y abre el acordeón para comparar.</p></div><aside class="progress"><strong id="pt">1 / 8</strong><div class="muted">Sección actual</div><div class="bar"><div class="fill" id="pf"></div></div></aside></header><nav class="steps" id="steps"></nav><section class="card" id="content"></section><div class="nav"><button id="prev">← Anterior</button><button class="next" id="next">Siguiente →</button></div><p class="tip">Consejo: explica también el porqué y menciona un ejemplo real de tu experiencia.</p></main><script>const D=[{t:'TypeScript',q:[['¿Cuál es la diferencia entre interface y type?','Ambos definen estructuras. interface es ideal para contratos de objetos y admite declaration merging; type es más flexible para uniones, intersecciones y tipos condicionales.'],['¿Qué diferencia existe entre any, unknown y never?','any desactiva el tipado; unknown obliga a validar antes de usar; never representa algo que nunca ocurre. En producción conviene preferir unknown sobre any.'],['¿Qué son los generics?','Permiten escribir código reutilizable conservando el tipo. Son útiles en repositorios, respuestas HTTP, colecciones y componentes.'],['¿Qué son los utility types?','Son transformaciones incorporadas como Partial, Required, Pick, Omit, Readonly, Record y ReturnType. Reducen duplicación de tipos.'],['¿Qué diferencia hay entre union e intersection types?','Una unión A | B acepta una alternativa; una intersección A & B combina las propiedades de ambos tipos.'],['¿Qué es un discriminated union?','Es una unión cuyas variantes comparten una propiedad literal discriminante. Facilita estados, eventos y respuestas de API con narrowing seguro.'],['¿Qué es type narrowing?','Es reducir un tipo amplio a uno específico usando typeof, instanceof, in, comparaciones literales o type guards.'],['¿Qué es un custom type guard?','Es una función que retorna value is Type y permite validar valores externos de forma segura para el compilador.'],['¿Qué diferencia existe entre readonly y const?','const evita reasignar la variable; readonly evita modificar una propiedad. const no vuelve inmutable el contenido del objeto.'],['¿Qué hace keyof?','Obtiene una unión con las claves de un tipo y se usa para acceso genérico seguro a propiedades.'],['¿Qué hacen typeof e indexed access types?','typeof deriva un tipo desde un valor; T[K] obtiene el tipo de una propiedad específica.'],['¿Qué son los mapped types?','Construyen un tipo recorriendo las claves de otro, por ejemplo haciendo todas sus propiedades opcionales o readonly.'],['¿Qué son los conditional types?','Permiten seleccionar un tipo mediante T extends U ? X : Y. Son la base de muchas utilidades avanzadas.'],['¿Qué hace infer?','Captura un tipo interno dentro de un conditional type, por ejemplo para extraer el valor de Promise<T> o el retorno de una función.'],['¿Qué son template literal types?','Construyen cadenas tipadas combinando literales, útiles para eventos, rutas y permisos.'],['¿Enum o unión de literales?','enum genera código en runtime; la unión de literales existe solo en compilación. Las uniones suelen ser más simples y ligeras.'],['¿Qué significa structural typing?','La compatibilidad se determina por la estructura y no por el nombre del tipo. Un objeto compatible puede tener propiedades adicionales.'],['¿Qué son excess property checks?','Son comprobaciones extra sobre objetos literales para detectar propiedades inesperadas. No siempre se aplican igual a variables intermedias.'],['¿Overloads o union types en funciones?','Las uniones son simples cuando el comportamiento es uniforme; los overloads sirven cuando las firmas y retornos dependen claramente de la entrada.'],['¿Qué hace satisfies?','Verifica que un valor cumpla un tipo sin perder la inferencia literal específica del objeto.'],['¿Diferencia entre as, as const y validación real?','as fuerza una interpretación pero no valida en runtime; as const conserva literales y readonly. Los datos externos deben validarse realmente.'],['¿Qué opciones de tsconfig son importantes?','strict, noUncheckedIndexedAccess, exactOptionalPropertyTypes, noImplicitOverride y forceConsistentCasingInFileNames, además de target y moduleResolution correctos.']]},{t:'Node.js',q:[['¿Cómo funciona el event loop?','JavaScript corre principalmente en un hilo y el event loop coordina I/O asíncrono. Esto permite atender otras solicitudes mientras se espera red o disco.'],['¿Qué puede bloquear el event loop?','Cálculos intensivos, APIs sync, parsing enorme y regex costosas. Se mitiga con APIs async, Worker Threads, colas o servicios separados.'],['Promise.all, allSettled o secuencial?','all es concurrente y falla rápido; allSettled espera todos los resultados; secuencial sirve cuando existe dependencia o debe limitarse concurrencia.'],['¿Cómo centralizar errores en una API?','Con errores tipados y un middleware global que traduzca respuestas, registre incidentes y no exponga detalles internos.'],['¿Cómo estructurarías un backend grande?','Separaría dominio, aplicación, infraestructura, interfaces y elementos compartidos. La lógica de negocio no debería depender de AWS ni del framework HTTP.'],['¿Qué aporta la programación funcional?','Funciones pequeñas, predecibles y puras, menor mutación, mejor composición y pruebas más simples.'],['¿Cómo implementarías idempotencia?','El cliente envía una idempotency key; el servidor guarda el resultado y ante un reintento devuelve el mismo sin repetir efectos secundarios.']]},{t:'React 18+',q:[['¿Estado local, global o del servidor?','Local pertenece a un componente; global se comparte entre áreas; server state viene de APIs y requiere caché, invalidación y sincronización.'],['¿useEffect, useMemo y useCallback?','useEffect sincroniza con sistemas externos; useMemo memoriza un cálculo; useCallback memoriza una función. Deben usarse solo cuando aportan valor.'],['¿Riesgos de dependencias incorrectas en useEffect?','Valores obsoletos, loops, solicitudes duplicadas y race conditions. Hay que declarar y entender cada dependencia.'],['¿Qué es un controlled component?','Un input cuyo valor proviene del estado de React y se actualiza mediante eventos. Facilita validación y sincronización.'],['¿Cómo evitar renders innecesarios?','Primero medir con Profiler; luego acercar el estado, dividir componentes, usar memoización selectiva, selectores y virtualización.'],['¿Context, Redux, Zustand o React Query?','Context para datos globales poco cambiantes; Redux/Zustand para estado cliente complejo; React Query para estado remoto.'],['¿Qué aporta React 18?','Automatic batching, transiciones, useDeferredValue y capacidades concurrentes que ayudan a priorizar actualizaciones.'],['¿Cómo organizar una aplicación grande?','Por dominios o features, con componentes, hooks, servicios y tests cercanos a cada funcionalidad.']]},{t:'AWS Serverless',q:[['Flujo API Gateway y Lambda','Cliente → CloudFront/API Gateway → autenticación y validación → Lambda → DynamoDB, S3 o SQS → respuesta.'],['¿Qué es un cold start?','Es la inicialización de un nuevo entorno Lambda. Se reduce con bundles pequeños, inicialización reutilizable y provisioned concurrency cuando se justifique.'],['¿Lambda o ECS/Fargate?','Lambda para eventos cortos y carga variable; contenedores para procesos largos, conexiones persistentes, dependencias complejas o mayor control del runtime.'],['¿DynamoDB o base relacional?','DynamoDB escala por patrones de acceso conocidos; una relacional es mejor para joins, consultas ad hoc y relaciones complejas.'],['¿Cómo elegir partition y sort key?','Partiendo de los access patterns. La partition key debe distribuir carga; la sort key organiza y consulta elementos relacionados.'],['¿Qué es un hot partition?','Exceso de tráfico sobre una misma clave. Se corrige redistribuyendo claves, aplicando sharding o caché.'],['¿SQS Standard o FIFO?','Standard prioriza throughput y entrega al menos una vez sin orden garantizado; FIFO conserva orden por grupo y deduplica.'],['¿Por qué consumidores idempotentes?','Porque SQS puede entregar duplicados. El procesamiento debe poder repetirse sin duplicar resultados.'],['¿Para qué sirven S3 y CloudFront?','S3 almacena objetos; CloudFront los distribuye con CDN, caché, TLS y menor latencia.'],['¿Cómo proteger archivos privados en S3?','Bloquear acceso público, mínimo privilegio IAM, cifrado, URLs prefirmadas y Origin Access Control.'],['¿Cómo investigar una Lambda lenta?','CloudWatch, duración, errores, throttles, cold starts, memoria, dependencias externas, concurrencia, payload y trazas.'],['¿Qué revisar ante un aumento de costos?','Cost Explorer por servicio y región, invocaciones anómalas, logs, transferencia, NAT Gateway, loops y recursos olvidados.']]},{t:'Arquitectura',q:[['Diseña una plataforma de reportes con IA','Frontend en CloudFront, API Gateway y Lambda, DynamoDB para estado, S3 para documentos, SQS para jobs y workers que llamen al LLM y guarden el reporte.'],['¿Proceso síncrono o asíncrono?','Síncrono para respuestas rápidas; asíncrono para documentos, reportes y LLMs largos, devolviendo 202 y un jobId.'],['¿Cómo aislar la caída de un proveedor?','Timeouts, reintentos con backoff y jitter, circuit breaker, colas, caché, fallback y degradación controlada.'],['¿Cómo escalar serverless?','Funciones stateless, colas para picos, concurrencia controlada, particiones sanas, caché, batch y backpressure.'],['¿Qué métricas buscar?','p95/p99, throughput, errores, CPU, memoria, concurrencia, throttling, latencia externa, edad de cola y cache hit ratio.'],['¿Escalabilidad vertical u horizontal?','Vertical aumenta recursos de una máquina; horizontal agrega instancias o consumidores y suele mejorar disponibilidad.'],['¿Cómo implementar observabilidad?','Logs estructurados, correlation IDs, métricas, trazas distribuidas, dashboards y alertas conectadas con métricas de negocio.'],['¿Cómo manejar secretos?','Secrets Manager o Parameter Store, IAM Roles, KMS, rotación y separación por ambiente. Nunca en el repositorio.']]},{t:'IA y Agentes',q:[['¿LLM directo o agente?','Un LLM directo recibe prompt y responde; un agente mantiene estado, elige herramientas y ejecuta varios pasos. No todo problema necesita agente.'],['¿Componentes de un agente?','Modelo, instrucciones, estado, memoria, herramientas, recuperación, control, validación, observabilidad y límites.'],['¿Workflow o agente autónomo?','Workflow define pasos predecibles; el agente decide dinámicamente. En procesos sensibles conviene maximizar determinismo.'],['¿Qué es RAG?','Recuperar fragmentos relevantes y enviarlos al modelo como contexto para responder con evidencia sin reentrenarlo.'],['¿Cómo reducir alucinaciones?','RAG, datos confiables, salidas estructuradas, temperatura baja, validación, citas, revisión humana y evaluaciones.'],['¿Cómo mitigar prompt injection?','Tratar contenido externo como datos, separar instrucciones, limitar herramientas, validar argumentos, aplicar permisos y exigir aprobación en acciones sensibles.'],['¿Cómo controlar costo y latencia?','Routing de modelos, límites de tokens, caché, contexto resumido, asincronía, paralelización controlada y monitoreo por operación.'],['¿Qué registrar en cada ejecución?','Modelo y prompt versionados, herramientas, tokens, costo, latencia, errores, resultado de validación, usuario y trace ID, evitando secretos.'],['¿Qué aporta LangGraph?','Grafos de estado explícitos, persistencia, ramas, ciclos, reintentos, interrupciones humanas y mejor trazabilidad.'],['¿Cómo evaluar respuestas?','Casos de prueba con exactitud, fidelidad, completitud, seguridad, sesgo, costo y latencia, combinando reglas y evaluación humana.'],['¿El agente debería decidir una contratación?','No como decisión final. Debe organizar evidencia y explicar recomendaciones con revisión humana y trazabilidad.']]},{t:'Testing y Seguridad',q:[['Unit, integración y E2E','Unit aísla una unidad; integración comprueba componentes; E2E recorre el flujo completo. Muchas unitarias, suficientes integraciones y pocas E2E críticas.'],['¿Qué probar en una Lambda?','Validación, autorización, lógica de negocio, respuestas, errores, idempotencia, reintentos e integración con servicios.'],['¿Cómo hacer un buen code review?','Revisar correctitud, seguridad, claridad, diseño, rendimiento, tests y observabilidad, explicando el motivo de cada comentario.'],['¿Riesgos comunes en una API?','Broken authorization, inyección, exposición de datos, SSRF, CORS, uploads peligrosos, falta de rate limiting, dependencias vulnerables e IAM excesivo.'],['¿Autenticación y autorización?','OIDC/Cognito, tokens cortos, roles, permisos por organización, validación en backend y mínimo privilegio.'],['¿Cómo proteger logs?','Redactar tokens, contraseñas, cookies y PII; registrar solo campos permitidos y necesarios.']]},{t:'Situacionales',q:[['Un endpoint tarda ocho segundos','Instrumentaría cada etapa con trazas para separar API Gateway, cold start, base de datos, LLM y serialización; optimizaría el componente responsable.'],['Dos usuarios actualizan el mismo registro','Usaría optimistic concurrency con versionado y una escritura condicional para rechazar cambios sobre una versión obsoleta.'],['Un mensaje SQS falla repetidamente','Configurar reintentos máximos, visibility timeout, DLQ, alarmas, idempotencia y un proceso seguro de reprocesamiento.'],['¿Reescribir un monolito a serverless?','No de entrada. Migraría incrementalmente con strangler pattern, empezando por módulos y procesos asíncronos de bajo riesgo.'],['Los fundadores quieren lanzar en dos días','Traducir riesgos a impacto comercial y proponer un alcance reducido con feature flag, métricas, rollback y deuda documentada.'],['Cuéntame una decisión arquitectónica','Responder con STAR: contexto, responsabilidad, alternativas, decisión, trade-offs y resultado medible.'],['¿Qué harías los primeros 30 días?','Entender producto y sistema, resolver uno o dos problemas críticos, mejorar observabilidad y proponer un roadmap técnico con una entrega visible.']]}];let cur=0;const steps=document.getElementById('steps'),content=document.getElementById('content'),pt=document.getElementById('pt'),pf=document.getElementById('pf'),prev=document.getElementById('prev'),next=document.getElementById('next');function render(){steps.innerHTML=D.map((s,i)=>`<button class="step ${i===cur?'active':''}" data-i="${i}">${i+1}<br>${s.t}</button>`).join('');const s=D[cur];content.innerHTML=`<div class="panel active"><div class="head"><div class="tag">Sección ${cur+1} de ${D.length}</div><h2>${s.t}</h2><div class="muted">${s.q.length} preguntas para practicar</div></div>${s.q.map((x,i)=>`<article class="qa"><button class="q"><span class="n">${String(i+1).padStart(2,'0')}</span><span>${x[0]}</span><span class="arrow">⌄</span></button><div class="ans"><p>${x[1]}</p></div></article>`).join('')}</div>`;pt.textContent=`${cur+1} / ${D.length}`;pf.style.width=`${(cur+1)/D.length*100}%`;prev.disabled=cur===0;next.disabled=cur===D.length-1;next.textContent=cur===D.length-1?'Completado ✓':'Siguiente →';document.querySelectorAll('.step').forEach(b=>b.onclick=()=>{cur=+b.dataset.i;render()});document.querySelectorAll('.q').forEach(b=>b.onclick=()=>b.parentElement.classList.toggle('open'))}prev.onclick=()=>{if(cur){cur--;render();scrollTo(0,0)}};next.onclick=()=>{if(cur<D.length-1){cur++;render();scrollTo(0,0)}};render();</script></body></html>
