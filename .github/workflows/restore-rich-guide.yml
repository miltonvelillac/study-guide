name: Restore rich study guide

on:
  push:
    paths:
      - '.github/workflows/restore-rich-guide.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore full questionnaire with examples
        shell: bash
        run: |
          python - <<'PY'
          import base64, gzip
          from pathlib import Path

          payload = """"""
          Path('index.html').write_bytes(gzip.decompress(base64.b64decode(payload)))
          PY

      - name: Commit restored guide
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Restore code examples in questionnaire [skip ci]"
            git push
          fi
